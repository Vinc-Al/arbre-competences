<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue des dons</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Page dons : catalogue plat, lecture seule. Réutilise les variables de style.css. */

  /* style.css est pensé pour une appli plein écran (canvas d'arbre) :
     html,body{overflow:hidden} + #app{height:100vh}. Une liste longue doit au
     contraire pouvoir défiler → on repasse la page en document classique. */
  html, body{ overflow:auto; height:auto; }
  #app{ height:auto; min-height:100vh; }

  /* #bg-glow / #bg-grid sont position:absolute avec z-index:0 et un fond OPAQUE.
     En ordre de peinture CSS, un élément positionné passe au-dessus du contenu
     non positionné : sans position+z-index ici, les cartes seraient masquées
     par le fond (elles étaient bien générées, mais invisibles). */
  #dons-wrap{ position:relative; z-index:2; max-width:1100px; margin:0 auto; padding:24px 20px 80px; }
  .dons-controls{
    position:sticky; top:0; z-index:5;
    display:flex; flex-wrap:wrap; gap:12px; align-items:center;
    padding:16px 0; margin-bottom:8px;
    background:linear-gradient(to bottom, var(--bg-0) 70%, rgba(10,14,20,0));
  }
  #dons-search{
    flex:1; min-width:220px;
    font-family:'Inter', sans-serif; font-size:0.95rem;
    color:var(--text-0); background:rgba(255,255,255,0.04);
    border:1px solid var(--line-dim); border-radius:8px;
    padding:10px 14px; outline:none;
  }
  #dons-search:focus{ border-color:var(--gold); }
  .dons-chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .dons-chip{
    font-family:'Inter', sans-serif; font-size:0.8rem;
    color:var(--text-1); background:rgba(255,255,255,0.03);
    border:1px solid var(--line-dim); border-radius:999px;
    padding:6px 14px; cursor:pointer; transition:all .15s;
    white-space:nowrap;
  }
  .dons-chip:hover{ color:var(--text-0); border-color:var(--gold); }
  .dons-chip.active{ color:var(--bg-0); background:var(--gold); border-color:var(--gold); font-weight:600; }
  #dons-count{ font-family:'Inter', sans-serif; font-size:0.8rem; color:var(--text-1); margin:4px 2px 14px; }
  .don-card{
    border:1px solid var(--line-dim); border-radius:10px;
    background:var(--panel-bg); padding:14px 18px; margin-bottom:10px;
    transition:border-color .15s;
  }
  .don-card:hover{ border-color:rgba(212,175,106,0.5); }
  .don-head{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:6px; }
  .don-nom{ font-family:'Cinzel','Spectral',Georgia,serif; font-size:1.1rem; color:var(--gold-bright); }
  .don-cat{
    font-family:'Inter', sans-serif; font-size:0.66rem; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--text-1); border:1px solid var(--line-dim); border-radius:999px; padding:2px 9px;
  }
  .don-desc{ color:var(--text-0); line-height:1.55; font-size:0.96rem; white-space:pre-line; }
  .don-desc em{ color:var(--gold-bright); font-style:italic; }
  .don-desc strong{ color:var(--text-0); font-weight:600; }
  .don-desc u{ text-decoration-color:var(--gold); }
  /* ── Bibliothèque : termes cliquables + petite fenêtre de définition ────── */
  .glossary-link{
    color:var(--arcane); text-decoration:none;
    border-bottom:1px dashed rgba(111,168,255,0.5);
    cursor:help; transition:color .15s, border-color .15s;
  }
  .glossary-link:hover{ color:var(--arcane-glow); border-bottom-color:var(--arcane-glow); }

  /* Popover : petite fenêtre ancrée au terme cliqué */
  #glossary-pop{
    position:absolute; z-index:60;
    width:min(340px, 88vw);
    background:var(--panel-bg);
    border:1px solid rgba(111,168,255,0.35);
    border-radius:10px;
    box-shadow:0 12px 34px rgba(0,0,0,0.6);
    padding:12px 14px 14px;
    display:none;
    animation:glossFade .13s ease-out;
  }
  #glossary-pop.open{ display:block; }
  @keyframes glossFade{ from{ opacity:0; transform:translateY(-4px);} to{ opacity:1; transform:none;} }
  #glossary-pop .gp-head{
    display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:6px;
  }
  #glossary-pop .gp-terme{
    font-family:'Cinzel','Spectral',Georgia,serif; font-size:1rem; color:var(--arcane-glow);
  }
  #glossary-pop .gp-close{
    background:none; border:none; color:var(--text-1); cursor:pointer;
    font-size:0.85rem; padding:0 2px; line-height:1;
  }
  #glossary-pop .gp-close:hover{ color:var(--text-0); }
  #glossary-pop .gp-def{ color:var(--text-0); font-size:0.9rem; line-height:1.5; }

  #dons-status{ text-align:center; color:var(--text-1); padding:40px; font-family:'Inter',sans-serif; }
  .dons-empty{ text-align:center; color:var(--text-1); padding:40px; font-family:'Inter',sans-serif; }
</style>
</head>
<body>
<div id="app">
  <div id="bg-glow"></div>
  <div id="bg-grid"></div>

  <nav id="main-nav">
    <a href="magie.html">✦ Arbre de sorts</a>
    <a href="martial.html">⚔ Voie martiale</a>
    <a href="dons.html" class="active">📖 Dons</a>
  </nav>

  <header>
    <div class="title-block">
      <h1 id="header-title">Catalogue des dons</h1>
      <div class="subtitle">Liste de référence — filtrez par catégorie ou recherchez</div>
    </div>
  </header>

  <div id="dons-wrap">
    <div class="dons-controls">
      <input id="dons-search" type="search" placeholder="Rechercher un don, un mot-clé…" autocomplete="off">
      <div class="dons-chips" id="dons-chips"></div>
    </div>
    <div id="dons-count"></div>
    <div id="dons-list"><div id="dons-status">Chargement des dons…</div></div>
  </div>
</div>

<div id="glossary-pop">
  <div class="gp-head">
    <span class="gp-terme" id="gp-terme">—</span>
    <button class="gp-close" id="gp-close" title="Fermer">✕</button>
  </div>
  <div class="gp-def" id="gp-def"></div>
</div>

<script src="config.js"></script>
<script>
/* =========================================================
   CATALOGUE DES DONS — autonome (ne charge pas le moteur d'arbre)
   Lit un onglet plat du Sheet : colonnes categorie, nom, description.
   ========================================================= */

// --- petit parseur CSV (gère guillemets, virgules et retours ligne internes) ---
function parseCSV(text){
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const rows = []; let row = [], field = '', inQ = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i];
    if(inQ){
      if(c === '"'){ if(text[i+1] === '"'){ field += '"'; i++; } else inQ = false; }
      else field += c;
    } else {
      if(c === '"') inQ = true;
      else if(c === ',') { row.push(field); field = ''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const headers = rows[0].map(h => h.trim().toLowerCase());
  return rows.slice(1)
    .filter(r => r.some(c => c && c.trim()))
    .map(r => { const o = {}; headers.forEach((h, i) => o[h] = (r[i] || '').trim()); return o; });
}

// --- mise en forme : MÊME SYNTAXE que la page éléments (parseRichText de app.js) ---
//   [texte](couleur) → mark coloré (color-feu, color-soin, color-special…)
//   [texte]          → référence stylée (.spell-ref)
//   [[terme]]        → lien de bibliothèque forcé
//   **gras**, *italique*, __souligné__, retours à la ligne
function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function richText(raw){
  let s = esc(raw);
  // [[terme]] : lien de bibliothèque explicite (avant les autres crochets)
  s = s.replace(/\[\[([^\]]+)\]\]/g, (m, t) => `<a class="glossary-link" data-terme="${t.replace(/"/g,'&quot;')}">${t}</a>`);
  // [texte](couleur) → mark coloré
  s = s.replace(/\[([^\]]+)\]\(([a-zA-Z0-9_-]+)\)/g, (m, txt, color) => `<mark class="color-${color}">${txt}</mark>`);
  // [texte] seul → référence stylée
  s = s.replace(/\[([^\]]+)\]/g, (m, txt) => `<span class="spell-ref">${txt}</span>`);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__([^_]+)__/g, '<u>$1</u>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

// --- normalisation pour la recherche (insensible casse + accents) ---
function norm(s){ return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }

let ALL_DONS = [];
let activeCat = '*';        // '*' = toutes
let searchTerm = '';

function render(){
  const list = document.getElementById('dons-list');
  const q = norm(searchTerm);
  const filtered = ALL_DONS.filter(d => {
    if(activeCat !== '*' && d.categorie !== activeCat) return false;
    if(q && !norm(d.nom + ' ' + d.description + ' ' + d.categorie).includes(q)) return false;
    return true;
  });

  document.getElementById('dons-count').textContent =
    `${filtered.length} don${filtered.length > 1 ? 's' : ''}` +
    (activeCat !== '*' ? ` — ${activeCat}` : '') + (q ? ` — « ${searchTerm} »` : '');

  if(!filtered.length){ list.innerHTML = '<div class="dons-empty">Aucun don ne correspond.</div>'; return; }

  list.innerHTML = filtered.map(d => `
    <div class="don-card">
      <div class="don-head">
        <span class="don-nom">${esc(d.nom || '—')}</span>
        ${d.categorie ? `<span class="don-cat">${esc(d.categorie)}</span>` : ''}
      </div>
      <div class="don-desc">${richText(d.description)}</div>
    </div>`).join('');

  linkifyGlossary(list);   // rend cliquables les termes de la bibliothèque
}

function buildChips(){
  const cats = [...new Set(ALL_DONS.map(d => d.categorie).filter(Boolean))];
  const chips = document.getElementById('dons-chips');
  const mk = (key, label) => {
    const b = document.createElement('button');
    b.className = 'dons-chip' + (key === activeCat ? ' active' : '');
    b.textContent = label;
    b.onclick = () => {
      activeCat = key;
      [...chips.children].forEach(c => c.classList.remove('active'));
      b.classList.add('active');
      render();
    };
    return b;
  };
  chips.appendChild(mk('*', 'Toutes'));
  cats.forEach(c => chips.appendChild(mk(c, c)));
}


/* =========================================================
   BIBLIOTHÈQUE : termes cliquables + panneau de définition
   =========================================================
   Deux façons de lier un terme dans une description :
     1. AUTOMATIQUE : tout terme (ou alias) présent dans l'onglet
        bibliothèque est détecté dans le texte et rendu cliquable.
        Rien à baliser dans tes CSV existants.
     2. EXPLICITE  : [[Terme]] force le lien (utile si le mot est
        écrit différemment, ou pour lier un terme non détecté).
   ========================================================= */
let GLOSSARY = {};       // clé normalisée -> { terme, definition }
let GLOSSARY_RE = null;  // regex de détection, construite une fois

function buildGlossaryRegex(){
  const keys = [];
  Object.values(GLOSSARY).forEach(e => {
    keys.push(e.terme);
    (e.aliasList || []).forEach(a => keys.push(a));
  });
  if(!keys.length){ GLOSSARY_RE = null; return; }
  // Les plus longs d'abord : "Blocage Magique" doit primer sur "Blocage"
  keys.sort((a, b) => b.length - a.length);
  const escRe = t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  // Bornes de mot compatibles accents (\b ne marche pas avec « é »)
  GLOSSARY_RE = new RegExp('(?<![\\p{L}\\p{N}])(' + keys.map(escRe).join('|') + ')(?![\\p{L}\\p{N}])', 'giu');
}

function glossaryLookup(text){
  return GLOSSARY[norm(text)] || null;
}

// Parcourt les nœuds TEXTE d'un conteneur et rend cliquables les termes connus.
// On travaille sur le DOM (et pas sur la chaîne HTML) pour ne jamais casser
// une balise ni re-baliser l'intérieur d'un lien déjà posé.
function linkifyGlossary(root){
  // GLOSSARY_AUTOLINK=false (config.js) : on ne lie QUE les [[termes]] balisés à la main
  if(typeof GLOSSARY_AUTOLINK !== 'undefined' && !GLOSSARY_AUTOLINK) return;
  if(!GLOSSARY_RE) return;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(node){
      if(!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      // ne pas toucher au contenu d'un lien déjà existant
      if(node.parentElement && node.parentElement.closest('.glossary-link')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const targets = [];
  let n; while((n = walker.nextNode())) targets.push(n);

  targets.forEach(node => {
    const text = node.nodeValue;
    GLOSSARY_RE.lastIndex = 0;
    if(!GLOSSARY_RE.test(text)) return;
    GLOSSARY_RE.lastIndex = 0;

    const frag = document.createDocumentFragment();
    let last = 0, m;
    while((m = GLOSSARY_RE.exec(text)) !== null){
      const entry = glossaryLookup(m[1]);
      if(!entry) continue;                       // alias inconnu → on laisse tel quel
      if(m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const a = document.createElement('a');
      a.className = 'glossary-link';
      a.dataset.terme = entry.terme;
      a.textContent = m[1];                      // garde la casse d'origine du texte
      frag.appendChild(a);
      last = m.index + m[1].length;
    }
    if(!last) return;
    if(last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  });
}

// Affiche la petite fenêtre, ancrée sous le terme cliqué et maintenue dans l'écran
function openGlossary(terme, anchorEl){
  const entry = glossaryLookup(terme);
  const pop = document.getElementById('glossary-pop');
  if(!entry){ pop.classList.remove('open'); return; }

  document.getElementById('gp-terme').textContent = entry.terme;
  const def = document.getElementById('gp-def');
  def.innerHTML = richText(entry.definition || 'Aucune définition fournie.');
  linkifyGlossary(def);              // définitions liées entre elles

  pop.classList.add('open');         // afficher d'abord pour mesurer sa taille
  if(anchorEl){
    const r = anchorEl.getBoundingClientRect();
    const w = pop.offsetWidth, h = pop.offsetHeight;
    const M = 8;                     // marge écran
    // sous le terme par défaut ; au-dessus s'il n'y a pas la place en bas
    let top = r.bottom + window.scrollY + 6;
    if(r.bottom + h + M > window.innerHeight && r.top - h - 6 > M){
      top = r.top + window.scrollY - h - 6;
    }
    let left = r.left + window.scrollX;
    const maxLeft = window.scrollX + window.innerWidth - w - M;
    if(left > maxLeft) left = maxLeft;
    if(left < window.scrollX + M) left = window.scrollX + M;
    pop.style.top = top + 'px';
    pop.style.left = left + 'px';
  }
}

function closeGlossary(){
  document.getElementById('glossary-pop').classList.remove('open');
}

async function loadGlossary(){
  const d = (typeof DATA_SHEETS !== 'undefined') ? DATA_SHEETS.bibliotheque : '';
  let urls = Array.isArray(d) ? d : (d && typeof d === 'object' ? Object.values(d) : [d]);
  urls = urls.map(u => (u || '').trim()).filter(Boolean);
  if(!urls.length) return;                       // pas de bibliothèque configurée → page normale

  const results = await Promise.allSettled(urls.map(async url => {
    const res = await fetch(url, { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return parseCSV(await res.text());
  }));

  results.forEach(r => {
    if(r.status !== 'fulfilled'){ console.warn('Bibliothèque inaccessible :', r.reason && r.reason.message); return; }
    r.value.forEach(row => {
      const terme = (row.terme || row.nom || '').trim();
      if(!terme) return;
      const aliasList = (row.alias || '').split(',').map(a => a.trim()).filter(Boolean);
      const entry = { terme, definition: row.definition || row.description || '', aliasList };
      GLOSSARY[norm(terme)] = entry;
      aliasList.forEach(a => GLOSSARY[norm(a)] = entry);
    });
  });
  buildGlossaryRegex();
}

// Délégation : un seul écouteur pour tous les liens (présents et à venir)
document.addEventListener('click', e => {
  const link = e.target.closest('.glossary-link');
  if(link){
    e.preventDefault(); e.stopPropagation();
    openGlossary(link.dataset.terme || link.textContent, link);
    return;
  }
  // clic en dehors de la fenêtre → fermeture
  if(!e.target.closest('#glossary-pop')) closeGlossary();
});
document.getElementById('gp-close').addEventListener('click', closeGlossary);
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeGlossary(); });

// Normalise DATA_SHEETS.dons (string | array | object) en liste d'URLs
function donsSources(){
  const d = (typeof DATA_SHEETS !== 'undefined') ? DATA_SHEETS.dons : '';
  let arr;
  if(Array.isArray(d)) arr = d;
  else if(d && typeof d === 'object') arr = Object.values(d);
  else arr = [d];
  return arr.map(u => (u || '').trim()).filter(Boolean);
}

async function loadDons(){
  const status = document.getElementById('dons-status');
  const urls = donsSources();
  if(!urls.length){
    status.innerHTML = 'Aucune source configurée. Renseigne <code>DATA_SHEETS.dons</code> dans config.js (une URL ou une liste).';
    return;
  }

  // Charge toutes les sources en parallèle ; une source en échec n'empêche pas les autres.
  const results = await Promise.allSettled(urls.map(async url => {
    const res = await fetch(url, { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return parseCSV(await res.text());
  }));

  ALL_DONS = [];
  let failed = 0;
  results.forEach(r => {
    if(r.status === 'fulfilled') ALL_DONS = ALL_DONS.concat(r.value);
    else { failed++; console.warn('Source de dons inaccessible :', r.reason && r.reason.message); }
  });

  if(!ALL_DONS.length){
    status.textContent = failed ? `Aucun don chargé (${failed}/${urls.length} source(s) en échec).` : 'Onglet(s) vide(s).';
    return;
  }
  await loadGlossary();   // avant le rendu : les termes seront cliquables d'emblée
  buildChips();
  render();
  if(failed) console.warn(`${failed} source(s) de dons sur ${urls.length} n'ont pas pu être chargées.`);
}

document.getElementById('dons-search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

loadDons();
</script>
</body>
</html>
