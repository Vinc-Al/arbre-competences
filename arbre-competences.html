<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbre de compétences — Écoles de magie</title>
<style>
  :root{
    --bg-0:#0a0e14;
    --bg-1:#0f1520;
    --line-dim:#2a3344;
    --gold:#d4af6a;
    --gold-bright:#f3cf8e;
    --arcane:#6fa8ff;
    --arcane-glow:#9fc4ff;
    --locked:#3a4253;
    --text-0:#e8ecf3;
    --text-1:#9aa4b8;
    --panel-bg:#10141d;
    --danger:#e08a8a;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--bg-0);
    color:var(--text-0);
    font-family:'Spectral', Georgia, serif;
    overflow:hidden;
    height:100%;
    width:100%;
  }

  #app{
    position:relative;
    width:100vw;
    height:100vh;
  }

  #bg-glow{
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 35%, rgba(111,168,255,0.10), transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(212,175,106,0.06), transparent 60%),
      var(--bg-0);
    z-index:0;
    transition:background 0.4s ease;
  }
  #bg-grid{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:48px 48px;
    z-index:0;
    pointer-events:none;
  }

  header{
    position:relative;
    z-index:5;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:18px 32px 0;
    border-bottom:1px solid var(--line-dim);
    background:linear-gradient(to bottom, rgba(10,14,20,0.92), rgba(10,14,20,0.75));
    flex-wrap:wrap;
    gap:10px;
  }
  header .title-block{ display:flex; flex-direction:column; gap:2px; padding-bottom:12px; }
  header h1{
    font-family:'Cinzel', 'Spectral', Georgia, serif;
    font-size:1.4rem;
    letter-spacing:0.06em;
    margin:0;
    color:var(--gold-bright);
    text-shadow:0 0 18px rgba(212,175,106,0.35);
    font-weight:600;
    transition:color 0.3s ease, text-shadow 0.3s ease;
  }
  header .subtitle{
    font-size:0.74rem;
    color:var(--text-1);
    letter-spacing:0.03em;
    font-family:'Inter', sans-serif;
  }
  header .right-block{
    display:flex;
    align-items:center;
    gap:10px;
    padding-bottom:12px;
    flex-wrap:wrap;
  }
  header .player-chip{
    font-family:'Inter', sans-serif;
    font-size:0.78rem;
    color:var(--text-0);
    border:1px solid var(--line-dim);
    padding:6px 12px;
    border-radius:999px;
    background:rgba(255,255,255,0.03);
    white-space:nowrap;
  }
  header .player-chip strong{ color:var(--gold-bright); font-weight:600; }
  header .points{
    font-family:'Inter', sans-serif;
    font-size:0.82rem;
    color:var(--arcane-glow);
    border:1px solid rgba(111,168,255,0.3);
    padding:6px 14px;
    border-radius:999px;
    background:rgba(111,168,255,0.06);
    white-space:nowrap;
  }

  /* School tabs */
  #school-tabs{
    display:flex;
    gap:4px;
    padding:0 32px;
    border-bottom:1px solid var(--line-dim);
    background:rgba(10,14,20,0.85);
    z-index:5;
    position:relative;
    overflow-x:auto;
  }
  .school-tab{
    font-family:'Inter', sans-serif;
    font-size:0.82rem;
    color:var(--text-1);
    padding:10px 18px;
    cursor:pointer;
    border-bottom:2.5px solid transparent;
    white-space:nowrap;
    transition:color 0.2s ease, border-color 0.2s ease;
    user-select:none;
  }
  .school-tab .dot{
    display:inline-block;
    width:7px; height:7px;
    border-radius:50%;
    margin-right:7px;
    vertical-align:middle;
  }
  .school-tab:hover{ color:var(--text-0); }
  .school-tab.active{
    color:var(--text-0);
  }

  /* Element selection bar */
  #element-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:10px 32px;
    border-bottom:1px solid var(--line-dim);
    background:rgba(10,14,20,0.7);
    position:relative;
    z-index:6;
    flex-wrap:wrap;
  }
  #element-select-wrap{ position:relative; }
  #element-select-btn{
    font-family:'Inter', sans-serif;
    font-size:0.8rem;
    color:var(--text-0);
    background:rgba(255,255,255,0.04);
    border:1px solid var(--line-dim);
    border-radius:8px;
    padding:8px 14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
  }
  #element-select-btn:hover{ border-color:var(--text-1); }
  #element-select-btn .caret{ font-size:0.7rem; color:var(--text-1); }
  #element-dropdown{
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    min-width:220px;
    background:var(--panel-bg);
    border:1px solid var(--line-dim);
    border-radius:10px;
    box-shadow:0 12px 30px rgba(0,0,0,0.5);
    padding:8px;
    display:none;
    flex-direction:column;
    gap:2px;
    z-index:20;
  }
  #element-dropdown.open{ display:flex; }
  #element-menu-warning{
    font-family:'Inter', sans-serif;
    font-size:0.72rem;
    color:#e08a8a;
    background:rgba(224,138,138,0.1);
    border:1px solid rgba(224,138,138,0.3);
    border-radius:6px;
    padding:7px 10px;
    margin-top:4px;
    display:none;
    line-height:1.4;
  }
  #element-menu-warning.show{ display:block; }
  .element-option{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    border-radius:6px;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    font-size:0.82rem;
    color:var(--text-0);
    user-select:none;
  }
  .element-option:hover{ background:rgba(255,255,255,0.05); }
  .element-option .dot{
    width:9px; height:9px;
    border-radius:50%;
    flex-shrink:0;
  }
  .element-option .check{
    margin-left:auto;
    width:16px; height:16px;
    border-radius:4px;
    border:1.5px solid var(--line-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:0.65rem;
    color:transparent;
    flex-shrink:0;
  }
  .element-option.selected .check{
    background:var(--text-0);
    color:var(--bg-0);
    border-color:var(--text-0);
  }

  #mastery-toggle-btn{
    font-family:'Inter', sans-serif;
    font-size:0.8rem;
    color:var(--arcane-glow);
    background:rgba(111,168,255,0.1);
    border:1px solid rgba(111,168,255,0.35);
    border-radius:8px;
    padding:8px 16px;
    cursor:pointer;
    white-space:nowrap;
  }
  #mastery-toggle-btn:hover{ background:rgba(111,168,255,0.18); }
  #mastery-toggle-btn.active{ background:rgba(111,168,255,0.28); color:var(--text-0); }

  /* Mastery view (replaces canvas-wrap when active) */
  #mastery-view{
    display:none;
    position:relative;
    width:100%;
    height:calc(100% - 168px);
    overflow-y:auto;
    z-index:2;
    padding:24px 32px 60px;
  }
  #mastery-view.open{ display:block; }
  #canvas-wrap.hidden{ display:none; }

  .mastery-empty{
    color:var(--text-1);
    font-family:'Inter', sans-serif;
    font-size:0.9rem;
    text-align:center;
    margin-top:60px;
  }

  .mastery-branch-select{
    margin-bottom:22px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .mastery-branch-select label{
    font-family:'Inter', sans-serif;
    font-size:0.78rem;
    color:var(--text-1);
  }
  .mastery-branch-select select{
    font-family:'Inter', sans-serif;
    font-size:0.82rem;
    color:var(--text-0);
    background:rgba(255,255,255,0.05);
    border:1px solid var(--line-dim);
    border-radius:6px;
    padding:6px 10px;
  }

  .element-card{
    max-width:640px;
    margin:0 auto 36px;
    background:var(--panel-bg);
    border:1.5px solid var(--line-dim);
    border-radius:14px;
    padding:22px 26px;
  }
  .element-card .ec-title{
    font-family:'Cinzel','Spectral',Georgia,serif;
    text-align:center;
    font-size:1.1rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    margin:0 0 14px;
  }
  .element-card .ec-intro{
    font-family:'Inter', sans-serif;
    font-size:0.88rem;
    line-height:1.6;
    color:var(--text-0);
    text-align:center;
    margin:0 0 22px;
  }
  .element-card .ec-tier{
    margin-bottom:18px;
  }
  .element-card .ec-tier-label{
    font-family:'Inter', sans-serif;
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-1);
    margin-bottom:8px;
  }
  .element-card .ec-choice{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid var(--line-dim);
    margin-bottom:6px;
    cursor:pointer;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .element-card .ec-choice:hover{ background:rgba(255,255,255,0.03); }
  .element-card .ec-choice.selected{
    border-color:var(--ec-color, var(--gold));
    background:color-mix(in srgb, var(--ec-color, var(--gold)) 10%, transparent);
  }
  .element-card .ec-choice .radio-dot{
    margin-top:3px;
    width:14px; height:14px;
    border-radius:50%;
    border:1.5px solid var(--line-dim);
    flex-shrink:0;
    position:relative;
  }
  .element-card .ec-choice.selected .radio-dot{ border-color:var(--ec-color, var(--gold)); }
  .element-card .ec-choice.selected .radio-dot::after{
    content:'';
    position:absolute;
    top:2px; left:2px; right:2px; bottom:2px;
    border-radius:50%;
    background:var(--ec-color, var(--gold));
  }
  .element-card .ec-choice-body{ font-family:'Inter', sans-serif; font-size:0.84rem; line-height:1.5; }
  .element-card .ec-choice-name{ font-weight:700; text-decoration:underline; margin-bottom:2px; color:var(--text-0); }
  .element-card .ec-choice-desc{ color:var(--text-0); opacity:0.92; }
  .element-card .ec-empty-tier{
    font-family:'Inter', sans-serif;
    font-size:0.8rem;
    color:var(--text-1);
    font-style:italic;
    padding:8px 0;
  }

  #canvas-wrap{
    position:relative;
    width:100%;
    height:calc(100% - 168px);
    overflow:auto;
    z-index:2;
    cursor:grab;
  }
  #canvas-wrap.dragging{cursor:grabbing;}

  #tree-canvas{
    position:relative;
    transform-origin:0 0;
  }

  svg#links{
    position:absolute;
    top:0; left:0;
    overflow:visible;
    pointer-events:none;
    z-index:1;
  }
  .link-line{
    stroke:var(--line-dim);
    stroke-width:2.5;
    fill:none;
    transition:stroke 0.25s ease, opacity 0.25s ease;
  }
  .link-line.unlocked{ stroke:var(--gold); opacity:0.85; }
  .link-line.available{ stroke:var(--arcane); opacity:0.55; stroke-dasharray:5 5; }

  .link-line{
    stroke:var(--line-dim);
    stroke-width:2;
    fill:none;
    opacity:0.85;
  }
  .link-line.fork{
    opacity:0.55;
  }

  .node{
    position:absolute;
    width:58px;
    height:58px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 35% 30%, #1b2230, var(--bg-1));
    border:2px solid var(--locked);
    cursor:pointer;
    z-index:3;
    transition:transform 0.15s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    font-family:'Inter', sans-serif;
  }
  .node:hover{ transform:translate(-50%,-50%) scale(1.12) !important; z-index:4; }
  .node .icon{
    font-size:1.15rem;
    filter:grayscale(0.6) brightness(0.7);
    transition:filter 0.2s ease;
    pointer-events:none;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .node .node-icon-img{
    width:36px;
    height:36px;
    object-fit:contain;
    border-radius:4px;
    filter:grayscale(0.5) brightness(0.75);
    transition:filter 0.2s ease;
    pointer-events:none;
    display:block;
  }
  .node.unlocked .node-icon-img,
  .node.available .node-icon-img,
  .node.root .node-icon-img{
    filter:none;
  }
  .node.locked .node-icon-img{
    filter:grayscale(0.8) brightness(0.5);
  }
  .node .node-label{
    position:absolute;
    top:50%;
    left:calc(100% + 10px);
    transform:translateY(-50%);
    width:108px;
    text-align:left;
    font-size:0.64rem;
    line-height:1.25;
    color:var(--text-1);
    pointer-events:none;
    white-space:normal;
  }

  .node.root{ width:72px; height:72px; }
  .node.root .icon{ filter:none; font-size:1.4rem; }
  .node.school-root .node-label{ display:none; }

  .node.unlocked{ border-color:var(--branche-color, var(--gold)); box-shadow:0 0 16px var(--branche-color, rgba(212,175,106,0.3)); }
  .node.unlocked .icon{ filter:none; }
  .node.unlocked .node-label{ color:var(--text-0); }

  .node.available{ border-color:var(--branche-color, var(--arcane)); box-shadow:0 0 14px var(--branche-color, rgba(111,168,255,0.35)); animation:pulse-available 2.4s ease-in-out infinite; }
  .node.available .icon{ filter:grayscale(0.15) brightness(0.95); }
  .node.available .node-label{ color:var(--text-0); }

  .node.locked{ opacity:0.6; }

  @keyframes pulse-available{
    0%,100%{ box-shadow:0 0 12px var(--branche-color, rgba(111,168,255,0.3)); }
    50%{ box-shadow:0 0 20px var(--branche-color, rgba(111,168,255,0.55)); }
  }

  /* Side panel (single skill detail) */
  #panel{
    position:fixed;
    top:0; right:0;
    height:100%;
    width:340px;
    background:var(--panel-bg);
    border-left:1px solid var(--line-dim);
    transform:translateX(100%);
    transition:transform 0.28s cubic-bezier(.2,.8,.2,1);
    z-index:10;
    display:flex;
    flex-direction:column;
    box-shadow:-12px 0 40px rgba(0,0,0,0.45);
  }
  #panel.open{ transform:translateX(0); }
  #panel .panel-head{ padding:26px 24px 16px; border-bottom:1px solid var(--line-dim); }
  #panel .panel-tier{
    font-family:'Inter', sans-serif; font-size:0.7rem; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--text-1); margin-bottom:6px;
  }
  #panel .panel-rank{
    font-family:'Cinzel','Spectral',Georgia,serif;
    font-size:1.05rem;
    letter-spacing:0.08em;
    color:#a98ce0;
    text-align:center;
    margin:0 0 6px;
  }
  #panel .panel-title{ font-family:'Cinzel','Spectral',Georgia,serif; font-size:1.3rem; color:var(--gold-bright); margin:0; }
  #panel .panel-body{
    padding:20px 24px; overflow-y:auto; flex:1;
    font-family:'Inter', sans-serif; font-size:0.9rem; line-height:1.55; color:var(--text-0);
  }
  #panel .rank-description{
    font-size:0.92rem;
    line-height:1.65;
    color:var(--text-0);
    margin:0 0 16px;
  }
  #panel .rank-stats{
    display:flex;
    flex-direction:column;
    gap:5px;
    margin:14px 0;
  }
  #panel .rank-stat-line{
    font-size:0.86rem;
    color:var(--text-0);
  }
  #panel .rank-stat-line .arrow{ color:var(--text-1); margin-right:6px; }
  #panel .rank-stat-line .stat-label{ font-weight:600; }
  #panel .rank-special{
    margin-top:16px;
    padding:12px 14px;
    border-radius:8px;
    font-size:0.86rem;
    line-height:1.55;
    background:rgba(224,138,192,0.08);
    border:1px solid rgba(224,138,192,0.3);
  }
  #panel .elemental-effects-block{
    margin-top:16px;
    padding:12px 14px;
    border-radius:8px;
    background:color-mix(in srgb, var(--ec-color, #9aa4b8) 8%, transparent);
    border:1px solid color-mix(in srgb, var(--ec-color, #9aa4b8) 35%, transparent);
  }
  #panel .elemental-effects-title{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin-bottom:8px;
    font-weight:700;
  }
  #panel .elemental-effect-line{
    font-size:0.82rem;
    line-height:1.5;
    margin-bottom:6px;
    color:var(--text-0);
  }
  #panel .elemental-effect-line .ee-tier{
    display:inline-block;
    font-size:0.62rem;
    color:var(--text-1);
    border:1px solid var(--line-dim);
    border-radius:4px;
    padding:0 5px;
    margin-right:6px;
    vertical-align:middle;
  }
  #panel .elemental-effect-line .ee-name{
    font-weight:700;
    text-decoration:underline;
  }
  #panel mark.color-element{ background:none; color:#d68ae0; font-style:italic; font-weight:600; }
  #panel mark.color-feu{ background:none; color:#e0793f; font-style:italic; font-weight:600; }
  #panel mark.color-glace{ background:none; color:#6fa8ff; font-style:italic; font-weight:600; }
  #panel mark.color-froid{ background:none; color:#6fa8ff; font-style:italic; font-weight:600; }
  #panel mark.color-foudre{ background:none; color:#e0d65f; font-style:italic; font-weight:600; }
  #panel mark.color-ombre{ background:none; color:#a99bd1; font-style:italic; font-weight:600; }
  #panel mark.color-lumiere{ background:none; color:#f3e6a8; font-style:italic; font-weight:600; }
  #panel mark.color-necrotique{ background:none; color:#7ea85a; font-style:italic; font-weight:600; }
  #panel mark.color-nature{ background:none; color:#5fd685; font-style:italic; font-weight:600; }
  #panel mark.color-soin{ background:none; color:#4fd17e; font-style:italic; font-weight:600; }
  #panel mark.color-poison{ background:none; color:#8fd14f; font-style:italic; font-weight:600; }
  #panel mark.color-acide{ background:none; color:#8fd14f; font-style:italic; font-weight:600; }
  #panel mark.color-special{ background:none; color:#e08ac0; font-weight:700; }
  #panel mark.color-danger{ background:none; color:#e0593f; font-weight:700; }
  #panel .stat-row{
    display:flex; justify-content:space-between; padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,0.06); font-size:0.85rem;
  }
  #panel .stat-row .label{ color:var(--text-1); }
  #panel .effects-block{
    margin-top:14px;
    padding:12px 14px;
    background:rgba(111,168,255,0.06);
    border:1px solid rgba(111,168,255,0.2);
    border-radius:8px;
    font-size:0.84rem;
  }
  #panel .effects-block .effects-label{
    font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--arcane-glow); margin-bottom:6px;
  }
  #panel .status-chip{
    display:inline-block; margin-top:14px; padding:5px 12px; border-radius:999px;
    font-size:0.72rem; letter-spacing:0.04em; font-family:'Inter',sans-serif;
  }
  .status-chip.unlocked{ background:rgba(212,175,106,0.15); color:var(--gold-bright); border:1px solid rgba(212,175,106,0.4); }
  .status-chip.available{ background:rgba(111,168,255,0.15); color:var(--arcane-glow); border:1px solid rgba(111,168,255,0.4); }
  .status-chip.locked{ background:rgba(255,255,255,0.05); color:var(--text-1); border:1px solid var(--line-dim); }

  #panel .panel-footer{ padding:18px 24px 24px; border-top:1px solid var(--line-dim); display:flex; flex-direction:column; gap:10px; }
  #panel a.slide-link{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:11px; border-radius:8px;
    text-decoration:none; font-family:'Inter',sans-serif; font-size:0.85rem;
    cursor:pointer; border:1px solid rgba(111,168,255,0.35);
    background:rgba(111,168,255,0.12); color:var(--arcane-glow);
    transition:background 0.2s ease;
  }
  #panel a.slide-link:hover{ background:rgba(111,168,255,0.22); }

  #panel-close{
    position:absolute; top:20px; right:18px; background:none; border:none;
    color:var(--text-1); font-size:1.3rem; cursor:pointer; line-height:1;
  }
  #panel-close:hover{ color:var(--text-0); }

  #overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.35);
    opacity:0; pointer-events:none; transition:opacity 0.25s ease; z-index:9;
  }
  #overlay.open{ opacity:1; pointer-events:auto; }

  #source-status{
    position:fixed; bottom:16px; left:16px; z-index:6;
    font-family:'Inter',sans-serif; font-size:0.72rem; color:var(--text-1);

<script>
/* =========================================================
   CONFIG GÉNÉRALE
   =========================================================

   --- 1. JOUEURS ---
   Chaque joueur a son propre onglet dans Google Sheets, publié
   séparément en CSV. On accède à sa page via :
       tonsite.com/arbre.html?joueur=Alice

   Renseigne ci-dessous, pour chaque joueur, l'URL CSV de SON
   onglet (Fichier > Partager > Publier sur le web > choisir
   l'onglet "Alice" > format CSV).

   Si le joueur dans l'URL ne correspond à aucune entrée ici,
   ou si l'URL est vide/inaccessible, la démo utilise des
   données d'exemple (DEMO_DATA) pour que la page fonctionne
   quand même.

   --- 2. ÉCOLES ---
   Une "école" = un arbre complet séparé (onglet de navigation
   en haut). Dans le Sheet de CHAQUE joueur, ajoute une colonne
   "ecole" à chaque ligne de compétence, avec une des valeurs :
   evocation, abjuration, invocation, transmutation, divination,
   illusion, enchantement, necromancie. La page regroupe
   automatiquement les compétences par valeur de cette colonne
   et crée un onglet par école trouvée. Le nom affiché et la
   couleur de chaque école sont définis dans SCHOOL_THEMES
   ci-dessous (modifiable librement).

   --- 3. STRUCTURE EN BRANCHES (façon arbre horizontal) ---
   Chaque compétence appartient à une "branche" : une ligne
   horizontale qui représente une progression (Niveau 0, I, II,
   III...). Toutes les compétences d'une même branche partagent
   la même valeur dans la colonne "branche" (ex: "trait_energetique"),
   et leur position sur la ligne est donnée par la colonne "niveau"
   (0, 1, 2, 3...).

   Une branche peut "s'embrancher" depuis une compétence d'une
   AUTRE branche : pour cela, sur le niveau 0 de la nouvelle
   branche, mets dans "parent_id" l'id de la compétence d'où elle
   part. La page dessine alors un lien en pointillés depuis ce
   point d'origine, et place la nouvelle ligne juste en dessous.
   Si parent_id est vide sur le niveau 0, la branche est une
   branche principale qui part directement de l'école.

   --- 4. EFFETS ---
   Ajoute une colonne "effets" dans le Sheet : texte libre
   décrivant ce que la compétence apporte (ex: "+20% dégâts
   de feu\n+1 portée"). Un retour à la ligne = un effet listé
   séparément dans le panneau de détail.

   --- 5. FICHE DE SORT (façon "carte RANK") ---
   Le panneau de détail affiche chaque compétence comme une
   fiche de sort : "RANK – {niveau}" en titre, une description,
   une liste de statistiques avec flèche "→", et un bloc spécial
   mis en valeur en bas (pour un effet de mot-clé du type
   "Affinité élémentaire 0 : ...").

   Colonnes optionnelles pour ça :
   - degats, portee, duree, action : texte libre (ex: "1d8",
     "18 mètres", "Instantané", "Action"). Une ligne "→ Label : valeur"
     est générée automatiquement pour chaque colonne remplie ;
     si une colonne est vide, sa ligne n'apparaît pas du tout.
   - texte_special : texte libre affiché dans un encadré coloré
     en bas de la fiche (ex: un mot-clé de sous-système comme
     "Affinité élémentaire").

   --- 6. BALISAGE DE TEXTE (couleurs et gras) ---
   Dans les colonnes "description", "texte_special" et "effets",
   tu peux utiliser une syntaxe simple, interprétée automatiquement :
     **texte**            -> affiché en gras
     [texte](couleur)      -> affiché en italique coloré

   Couleurs disponibles (modifiables dans le CSS, classes .color-*) :
     element, feu, glace, soin, poison, special, danger

   Exemple de cellule "description" :
     Vous ciblez une créature que vous pouvez voir, vous lancez une
     **attaque de sort à distance** [élémentaire](element) sur une
     **cible unique**.

   Exemple de cellule "texte_special" :
     **Affinité élémentaire 0** : Les éléments changent le type de
     dégât du sort.

   Colonnes attendues dans chaque onglet joueur :
   id | nom | description | branche | niveau | parent_id | cout | etat | lien_slide | icone | ecole | effets | degats | portee | duree | action | texte_special

   - id        : identifiant unique de la compétence
   - nom       : nom affiché sous le nœud
   - branche   : nom de la ligne horizontale à laquelle elle appartient
   - niveau    : position dans la ligne (0, 1, 2, 3...) — sert aussi
                 de numéro de RANK affiché sur la fiche
   - parent_id : (seulement utile sur le niveau 0 d'une branche qui
                 s'embranche) id de la compétence d'origine du fork
   - etat      : "unlocked" / "available" / "locked"
   - cout      : coût en points pour débloquer (informatif)
   - lien_slide: URL optionnelle vers un Google Slide de détail
   - icone     : emoji affiché dans le nœud
   - ecole     : evocation / abjuration / invocation / transmutation /
                 divination / illusion / enchantement / necromancie
   - effets    : texte libre, un effet par ligne
   - degats / portee / duree / action : statistiques affichées avec
                 une flèche dans la fiche (laisser vide si non pertinent)
   - texte_special : bloc de texte mis en valeur en bas de la fiche

   --- 7. MAÎTRISE ÉLÉMENTAIRE ---
   Système séparé, configuré directement dans ce fichier (pas
   encore relié au Sheet) :

   - ELEMENT_THEMES : liste des éléments disponibles dans le menu
     global, avec leur couleur.
   - ELEMENT_CARDS : pour chaque élément simple, le titre de carte
     et le texte d'intro générique (peut utiliser le balisage
     **gras** et [texte](couleur) comme partout ailleurs).
   - ELEMENT_MASTERY : pour chaque élément simple, un tableau de
     4 tiers (0 à 3). Chaque tier contient une liste d'effets au
     choix. Chaque effet a un "branches" qui vaut soit "*"
     (proposé sur toutes les branches) soit une liste de noms de
     branches séparés par des virgules (ex: "trait_energetique,nova")
     — l'effet n'apparaît alors que pour ces branches précises.
   - ELEMENT_COMBOS : fusions de 2 éléments (jamais plus). Une
     fusion n'existe que si elle est déclarée ici, avec sa propre
     carte et ses propres 4 tiers — elle est alors traitée comme
     un élément à part entière, distinct des 2 éléments d'origine.
     Clé attendue : comboKey(a,b), qui trie les 2 noms d'éléments
     pour garantir une clé stable quel que soit l'ordre de
     sélection (ex: comboKey('feu','acide') === comboKey('acide','feu')).

   RÈGLES DE SÉLECTION (menu global, haut de page) :
   - Maximum 2 éléments cochés simultanément.
   - Si 1 seul élément est coché, c'est lui qui est actif.
   - Si on essaie d'en cocher un 2e, la paire doit exister dans
     ELEMENT_COMBOS ; sinon la sélection est refusée et un message
     s'affiche ("Aucune fusion définie entre X et Y").
   - Tenter d'en cocher un 3e est bloqué (il faut décocher avant).

   VUE "MAÎTRISE ÉLÉMENTAIRE" (bouton dédié) :
   - Affiche la carte de l'élément actif (simple ou fusion) avec
     ses 4 tiers. Le Tier 0 ("Modulation de forme") y reste
     visible et sélectionnable.
   - Un sélecteur filtre quels effets sont pertinents pour une
     branche donnée.
   - Cliquer sur un effet le sélectionne/désélectionne — c'est un
     simulateur libre, rien n'est jamais figé.

   FICHE DE SORT (panneau de détail d'une compétence) :
   - Tous les tiers de maîtrise (0, 1, 2, 3) que le joueur a
     EXPLICITEMENT sélectionnés dans la vue Maîtrise s'affichent
     sur la fiche d'un sort, quel que soit le niveau du sort
     consulté (0, I, II, III...) — y compris le Tier 0.
   - Si le joueur n'a rien choisi à un tier donné, ce tier
     n'apparaît pas du tout sur la fiche (pas de liste exhaustive
     des choix possibles).
   - Un effet choisi ne s'affiche que s'il est pertinent pour la
     branche du sort consulté (sinon rien ne s'affiche pour ce tier).
*/

/* =========================================================

   =========================================================

   1. Onglet "competences" : toutes les compétences de toutes
      les écoles et branches (structure inchangée).

   2. Onglet "elements" : définit les éléments disponibles,

      de lignes ci-dessous.
      → Colle son URL dans DATA_SHEETS.elements

   3. Onglet "combos" : définit les fusions de 2 éléments.
      → Colle son URL dans DATA_SHEETS.combos

   SHEET JOUEUR (un onglet par joueur, lecture seule côté web
   pour l'instant — l'écriture automatique nécessite la config
   Google Apps Script séparée décrite plus bas) :
   Contient les choix de maîtrise élémentaire du joueur (les
   cases cochées dans la vue Maîtrise). Le statut des compétences
   (unlocked/available/locked) reste géré par le MJ dans le

   → Renseigne un onglet par joueur dans PLAYER_SHEETS

   STRUCTURE DU CSV "elements" (1 ligne = 1 effet) :
   element_key | element_label | element_color | carte_titre |
   carte_intro | tier | effet_id | effet_nom | branches |
   description | combo_avec (vide si élément simple, ou la clé
   du 2e élément si c'est une fusion ex: "acide" pour feu+acide)

   STRUCTURE DU CSV "combos" (1 ligne = 1 combo) :
   element_a | element_b | label | color | titre | intro

   STRUCTURE DU CSV joueur (1 ligne = 1 choix de tier) :
   element_key | tier | effet_id
   ========================================================= */

/* =========================================================
   SYSTÈME DE MAÎTRISE ÉLÉMENTAIRE
   =========================================================
   Le joueur sélectionne un ou plusieurs éléments dans le menu
   global (en haut de page). Pour chaque élément sélectionné :

   1. Une "carte" d'introduction s'affiche (titre, texte

   Pour ajouter un élément ou modifier ses effets, édite

/* =========================================================
   FUSIONS ÉLÉMENTAIRES (max 2 éléments)
   =========================================================
   Une fusion combine exactement 2 éléments de base et est
   traitée comme un élément à part entière : sa propre carte,
   ses propres 4 tiers de maîtrise, sa propre couleur. Une
   fusion n'existe que si elle est explicitement déclarée ici
   — cocher 2 éléments dont la paire n'est pas définie ci-dessous
   n'est pas autorisé (le menu refuse la 2e sélection).

   Clé de combo : les 2 clés d'éléments triées par ordre
   alphabétique et jointes par "+" (ex: "acide+feu").
   Utilise la fonction comboKey(a,b) si tu ajoutes des entrées
   pour être sûr du format exact.
   ========================================================= */
function comboKey(a, b){
  return [a, b].sort().join('+');
}

  opts = opts || {};
  return {
    id, nom, branche, niveau, parent_id: parent_id || "",
    cout: opts.cout !== undefined ? opts.cout : niveau,
    etat, lien_slide: opts.lien || "", icone: opts.icone || "",
    ecole: opts.ecole, effets: opts.effets || "", description: opts.description || "",
    degats: opts.degats || "", portee: opts.portee || "", duree: opts.duree || "", action: opts.action || "",
    texte_special: opts.special || ""
  };
}

function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const headers = rows[0].map(h => h.trim().toLowerCase());
  return rows.slice(1).filter(r => r.some(c => c.trim() !== '')).map(r => {
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (r[idx] ?? '').trim());
    obj.niveau = parseInt(obj.niveau, 10) || 0;
    obj.cout = parseInt(obj.cout, 10) || 0;
    if(!obj.ecole) obj.ecole = 'default';
    return obj;
  });
}

async function fetchCSV(url){
  const res = await fetch(url, { cache: 'no-store' });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const rows = parseCSV(text);
  if(!rows.length) throw new Error('CSV vide');
  return rows;
}

function parseElementsCSV(rows){
  // Builds ELEMENT_THEMES, ELEMENT_CARDS, ELEMENT_MASTERY from the
  // "elements" sheet. Each row is one mastery effect.
  // Columns: element_key | element_label | element_color | carte_titre |
  //          carte_intro | tier | effet_id | effet_nom | branches | description
  const themes = {};
  const cards = {};
  const mastery = {};

  rows.forEach(r => {
    const key = r.element_key;
    if(!key) return;
    if(!themes[key]){
      themes[key] = { label: r.element_label || key, color: r.element_color || '#9aa4b8' };
    }
    if(!cards[key]){
      cards[key] = { titre: r.carte_titre || key, intro: r.carte_intro || '' };
    }
    if(!mastery[key]) mastery[key] = [[],[],[],[]];
    const tier = parseInt(r.tier, 10);
    if(isNaN(tier) || tier < 0 || tier > 3) return;
    if(!r.effet_id) return; // header row or empty
    mastery[key][tier].push({
      id: r.effet_id,
      nom: r.effet_nom || r.effet_id,
      branches: r.branches || '*',
      description: r.description || '',
    });
  });

  return { themes, cards, mastery };
}

function parseCombosCSV(rows){
  // Columns: element_a | element_b | label | color | titre | intro
  const combos = {};
  rows.forEach(r => {
    if(!r.element_a || !r.element_b) return;
    const key = comboKey(r.element_a, r.element_b);
    combos[key] = {
      label: r.label || `${r.element_a} + ${r.element_b}`,
      color: r.color || '#d4af6a',
      titre: r.titre || key,
      intro: r.intro || '',
      tiers: [[],[],[],[]], // combo effects loaded separately from elements sheet (combo_avec column)
    };
  });
  return combos;
}

function parsePlayerSavesCSV(rows){
  // Columns: element_key | tier | effet_id
  // Returns masteryChoices object: `${groupKey}_t${tier}` -> effet_id
  const choices = {};
  rows.forEach(r => {
    if(!r.element_key || r.tier === undefined || r.tier === '') return;
    const tier = parseInt(r.tier, 10);
    if(isNaN(tier)) return;
    choices[`${r.element_key}_t${tier}`] = r.effet_id || null;
  });
  return choices;
}

async function loadData(){
  const statusEl = document.getElementById('source-status');
  const playerName = getPlayerFromURL();
  document.getElementById('player-name').textContent = playerName || '(aucun — démo)';

  let skillsLoaded = false;
  let elementsLoaded = false;

  // --- Load competences (DATA sheet or player sheet) ---
  const playerCsvUrl = PLAYER_SHEETS[playerName];
  const competencesUrl = DATA_SHEETS.competences;
  const skillsUrl = playerCsvUrl || competencesUrl;

  if(skillsUrl){
    try{
      const rows = await fetchCSV(skillsUrl);
      allSkills = rows;
      skillsLoaded = true;
    } catch(err){
      console.warn('Compétences inaccessibles, repli sur démo :', err);
    }
  }
  if(!skillsLoaded){
    allSkills = DEMO_DATA;
    statusEl.textContent = playerName
      ? `Sheet de ${playerName} inaccessible — démonstration affichée`
      : 'Mode démonstration — ajoute ?joueur=NomDuJoueur à l\'URL';
  }

  // --- Load elements from DATA sheet ---
  if(DATA_SHEETS.elements){
    try{
      const rows = await fetchCSV(DATA_SHEETS.elements);
      const parsed = parseElementsCSV(rows);
      // Merge into live config objects (override hardcoded defaults)
      Object.assign(ELEMENT_THEMES, parsed.themes);
      Object.assign(ELEMENT_CARDS, parsed.cards);
      Object.assign(ELEMENT_MASTERY, parsed.mastery);
      elementsLoaded = true;
    } catch(err){
      console.warn('Éléments inaccessibles, données codées en dur utilisées :', err);
    }
  }

  // --- Load combos from DATA sheet ---
  if(DATA_SHEETS.combos){
    try{
      const rows = await fetchCSV(DATA_SHEETS.combos);
      const parsed = parseCombosCSV(rows);
      Object.assign(ELEMENT_COMBOS, parsed);
    } catch(err){
      console.warn('Combos inaccessibles, données codées en dur utilisées :', err);
    }
  }

  // --- Load player mastery saves ---
  if(playerCsvUrl){
    // The player sheet may have a second tab for saves — but for now
    // mastery saves live in the same tab; filter by a special marker column.
    // If a dedicated save URL exists (PLAYER_SAVE_SHEETS), load from there.
    const saveUrl = typeof PLAYER_SAVE_SHEETS !== 'undefined' && PLAYER_SAVE_SHEETS[playerName];
    if(saveUrl){
      try{
        const rows = await fetchCSV(saveUrl);
        const saved = parsePlayerSavesCSV(rows);
        Object.assign(masteryChoices, saved);
      } catch(err){
        console.warn('Sauvegardes joueur inaccessibles :', err);
      }
    }
  }

  if(skillsLoaded && elementsLoaded){
    statusEl.textContent = `Données chargées${playerName ? ' pour ' + playerName : ''} ✓`;
  } else if(skillsLoaded){
    statusEl.textContent = `Compétences chargées${playerName ? ' pour ' + playerName : ''} ✓ (éléments : mode démo)`;
  }
}

function schoolTheme(key){
  return SCHOOL_THEMES[key] || { ...SCHOOL_THEMES.default, label: key.charAt(0).toUpperCase() + key.slice(1) };
}

function buildSchoolTabs(){
  const seen = new Set();
  schoolsOrder = [];
  allSkills.forEach(s => {
    if(!seen.has(s.ecole)){ seen.add(s.ecole); schoolsOrder.push(s.ecole); }
  });
  if(!currentSchool || !schoolsOrder.includes(currentSchool)){
    currentSchool = schoolsOrder[0] || null;
  }

  const tabsEl = document.getElementById('school-tabs');
  tabsEl.innerHTML = '';
  schoolsOrder.forEach(key => {
    const theme = schoolTheme(key);
    const tab = document.createElement('div');
    tab.className = 'school-tab' + (key === currentSchool ? ' active' : '');
    tab.style.borderBottomColor = key === currentSchool ? theme.color : 'transparent';
    tab.style.color = key === currentSchool ? theme.color : '';
    tab.innerHTML = `<span class="dot" style="background:${theme.color}"></span>${theme.label}`;
    tab.addEventListener('click', () => {
      currentSchool = key;
      masteryBranchFilter = null; // reset: branches differ per school
      buildSchoolTabs();
      applySchoolTheme();
      renderTree();
      if(masteryViewOpen) renderMasteryView();
    });
    tabsEl.appendChild(tab);
  });
}

function applySchoolTheme(){
  const theme = schoolTheme(currentSchool);
  document.getElementById('header-title').textContent = theme.label;
  document.getElementById('header-title').style.color = theme.color;
  document.getElementById('header-title').style.textShadow = `0 0 18px ${theme.glow}`;
}

/* =========================================================
   MENU GLOBAL DE SÉLECTION D'ÉLÉMENTS
   =========================================================
   Règles : au maximum 2 éléments cochés en même temps. Si 1 seul
   est coché, on travaille avec cet élément simple. Si on essaie
   d'en cocher un 2e, la paire doit exister dans ELEMENT_COMBOS
   (clé = comboKey(a,b)) — sinon la sélection est refusée et un
   message s'affiche brièvement.
   ========================================================= */
function elementTheme(key){
  return ELEMENT_THEMES[key] || { label: key, color: '#9aa4b8' };
}

// Returns the "active group" derived from selectedElements:
// either a single element, or a defined 2-element combo.
function getActiveGroup(){
  const keys = Array.from(selectedElements);
  if(keys.length === 0) return null;
  if(keys.length === 1){
    return { type:'single', key: keys[0], theme: elementTheme(keys[0]), card: ELEMENT_CARDS[keys[0]], tiers: ELEMENT_MASTERY[keys[0]] || [[],[],[],[]] };
  }
  // length === 2 (enforced at selection time)
  const key = comboKey(keys[0], keys[1]);
  const combo = ELEMENT_COMBOS[key];
  if(!combo) return null; // shouldn't happen since we block invalid pairs at click time
  return { type:'combo', key, theme: { label: combo.label, color: combo.color }, card: { titre: combo.titre, intro: combo.intro }, tiers: combo.tiers };
}

function showElementMenuWarning(message){
  let warn = document.getElementById('element-menu-warning');
  if(!warn){
    warn = document.createElement('div');
    warn.id = 'element-menu-warning';
    document.getElementById('element-dropdown').appendChild(warn);
  }
  warn.textContent = message;
  warn.classList.add('show');
  clearTimeout(showElementMenuWarning._t);
  showElementMenuWarning._t = setTimeout(() => warn.classList.remove('show'), 2600);
}

function renderElementDropdown(){
  const dropdown = document.getElementById('element-dropdown');
  dropdown.innerHTML = '';
  Object.keys(ELEMENT_THEMES).forEach(key => {
    const theme = elementTheme(key);
    const isSelected = selectedElements.has(key);
    const opt = document.createElement('div');
    opt.className = 'element-option' + (isSelected ? ' selected' : '');
    opt.innerHTML = `
      <span class="dot" style="background:${theme.color}"></span>
      <span>${theme.label}</span>
      <span class="check">✓</span>
    `;
    opt.addEventListener('click', () => {
      if(isSelected){
        selectedElements.delete(key);
      } else {
        if(selectedElements.size === 0){
          selectedElements.add(key);
        } else if(selectedElements.size === 1){
          const other = Array.from(selectedElements)[0];
          const ck = comboKey(other, key);
          if(ELEMENT_COMBOS[ck]){
            selectedElements.add(key);
          } else {
            showElementMenuWarning(`Aucune fusion définie entre ${elementTheme(other).label} et ${theme.label}.`);
            return;
          }
        } else {
          showElementMenuWarning('Maximum 2 éléments à la fois — désélectionne-en un d\'abord.');
          return;
        }
      }
      renderElementDropdown();
      updateElementSelectLabel();
      if(masteryViewOpen) renderMasteryView();
    });
    dropdown.appendChild(opt);
  });
}

function updateElementSelectLabel(){
  const label = document.getElementById('element-select-label');
  const group = getActiveGroup();
  if(!group){
    label.textContent = 'Éléments : aucun';
  } else if(group.type === 'combo'){
    label.textContent = 'Élément : ' + group.theme.label + ' (fusion)';
  } else {
    label.textContent = 'Élément : ' + group.theme.label;
  }
}

document.getElementById('element-select-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('element-dropdown').classList.toggle('open');
});
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('element-select-wrap');
  if(!wrap.contains(e.target)){
    document.getElementById('element-dropdown').classList.remove('open');
  }
});

/* =========================================================
   VUE "MAÎTRISE ÉLÉMENTAIRE"
   =========================================================
   Affiche, pour chaque élément sélectionné dans le menu global,
   une carte avec son intro et ses 4 tiers de maîtrise. Les
   effets proposés à chaque tier sont filtrés selon la branche
   actuellement choisie dans le sélecteur de la vue (qui liste
   les branches de l'école active).
   ========================================================= */
function getBranchesForCurrentSchool(){
  const skills = currentSkills();
  const seen = new Set();
  const list = [];
  skills.forEach(s => {
    const key = s.branche || s.id;
    if(!seen.has(key)){ seen.add(key); list.push(key); }
  });
  return list;
}

function effectAppliesToBranch(effect, brancheKey){
  if(!effect.branches || effect.branches === '*') return true;
  const list = effect.branches.split(',').map(s => s.trim());
  return list.includes(brancheKey);
}

function toggleMasteryView(forceOpen){
  masteryViewOpen = forceOpen !== undefined ? forceOpen : !masteryViewOpen;
  document.getElementById('mastery-view').classList.toggle('open', masteryViewOpen);
  document.getElementById('canvas-wrap').classList.toggle('hidden', masteryViewOpen);
  document.getElementById('mastery-toggle-btn').classList.toggle('active', masteryViewOpen);
  if(masteryViewOpen) renderMasteryView();
}
document.getElementById('mastery-toggle-btn').addEventListener('click', () => toggleMasteryView());

function renderMasteryView(){
  const container = document.getElementById('mastery-view');
  const branches = getBranchesForCurrentSchool();

  if(!masteryBranchFilter || !branches.includes(masteryBranchFilter)){
    masteryBranchFilter = branches[0] || null;
  }

  const group = getActiveGroup();
  if(!group){
    container.innerHTML = `<div class="mastery-empty">Sélectionne un élément (ou une paire d'éléments fusionnés) dans le menu ci-dessus pour voir sa progression de maîtrise.</div>`;
    return;
  }

  let html = '';

  // branch filter selector (affects which mastery effects are shown)
  if(branches.length){
    html += `<div class="mastery-branch-select">
      <label for="mastery-branch-picker">Afficher les effets pertinents pour la branche :</label>
      <select id="mastery-branch-picker">
        ${branches.map(b => `<option value="${b}" ${b===masteryBranchFilter?'selected':''}>${b.replace(/_/g,' ')}</option>`).join('')}
      </select>
    </div>`;
  }

  const { key: groupKey, theme, card, tiers } = group;

  html += `<div class="element-card" style="--ec-color:${theme.color}">
    <div class="ec-title" style="color:${theme.color}">${card.titre}</div>
    <div class="ec-intro">${parseRichText(card.intro)}</div>`;

  tiers.forEach((effects, tierIndex) => {
    const relevant = effects.filter(ef => effectAppliesToBranch(ef, masteryBranchFilter));
    html += `<div class="ec-tier">
      <div class="ec-tier-label">Tier ${tierIndex}${tierIndex===0 ? ' — Modulation de forme' : ''}</div>`;
    if(!relevant.length){
      html += `<div class="ec-empty-tier">Aucun effet défini pour cette branche à ce tier.</div>`;
    } else {
      relevant.forEach(ef => {
        const choiceKey = `${groupKey}_t${tierIndex}`;
        const isSelected = masteryChoices[choiceKey] === ef.id;
        html += `<div class="ec-choice ${isSelected?'selected':''}" data-choice-key="${choiceKey}" data-effect-id="${ef.id}">
          <span class="radio-dot"></span>
          <span class="ec-choice-body">
            <div class="ec-choice-name">${ef.nom}</div>
            <div class="ec-choice-desc">${parseRichText(ef.description)}</div>
          </span>
        </div>`;
      });
    }
    html += `</div>`;
  });

  html += `</div>`;

  container.innerHTML = html;

  const picker = document.getElementById('mastery-branch-picker');
  if(picker){
    picker.addEventListener('change', (e) => {
      masteryBranchFilter = e.target.value;
      renderMasteryView();
    });
  }

  container.querySelectorAll('.ec-choice').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.getAttribute('data-choice-key');
      const effectId = el.getAttribute('data-effect-id');
      masteryChoices[key] = (masteryChoices[key] === effectId) ? null : effectId;
      renderMasteryView();
      savePlayerChoices(); // auto-save on every change
    });
  });
}

/* =========================================================
   SAUVEGARDE AUTOMATIQUE VIA GOOGLE APPS SCRIPT
   =========================================================
   Appelée à chaque changement de choix de maîtrise élémentaire.
   Ne fait rien si APPS_SCRIPT_URL n'est pas configuré.
   ========================================================= */
let _saveDebounceTimer = null;

function savePlayerChoices(){
  if(!APPS_SCRIPT_URL) return;
  const playerName = getPlayerFromURL();
  if(!playerName) return;

  // Debounce : attendre 800ms d'inactivité avant d'envoyer,
  // pour éviter de spammer l'API à chaque clic rapide.
  clearTimeout(_saveDebounceTimer);
  _saveDebounceTimer = setTimeout(async () => {
    const statusEl = document.getElementById('source-status');
    statusEl.textContent = 'Sauvegarde en cours…';

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          joueur: playerName,
          section: 'elementaire',
          data: masteryChoices,
        }),
        redirect: 'follow', // Apps Script redirects on POST
      });
      const json = await res.json();
      if(json.ok){
        statusEl.textContent = 'Sauvegardé ✓';
      } else {
        statusEl.textContent = `Erreur sauvegarde : ${json.error}`;
      }
    } catch(err){
      console.warn('Sauvegarde échouée :', err);
      statusEl.textContent = 'Sauvegarde échouée (hors ligne ?)';
    }
  }, 800);
}

function currentSkills(){
  return allSkills.filter(s => s.ecole === currentSchool);
}

/* =========================================================
   LAYOUT ALGORITHM — horizontal branch rows with branching offshoots
   =========================================================
   Each skill belongs to a "branche" (a named horizontal lineage,
   e.g. "trait_energetique"). Within a branche, skills are ordered
   by "niveau" (0,1,2,3...) and placed left-to-right on the same
   row. A branche can "fork" off an existing node in another
   branche by setting parent_id to that node's id on its OWN
   niveau-0 skill — this draws a dashed connector down to a new
   row that starts just to the right of the parent, and the new
   row is placed directly under (or near) the parent's row so the
   whole thing reads like the reference skill-tree image.

   To get a clean vertical ordering that mimics the reference
   image (root branch on top, its forks right under it, in the
   order they appear, recursively), we do a DFS over the "branche
   graph": branches with no parent_id are roots (one row each,
   evenly stacked top-to-bottom in the order encountered), and a
   branche that forks from another is placed as a child row
   immediately following its parent branche's row (and any of the
   parent's earlier children), pushed down by however many rows
   its own descendant forks need.
*/

function buildBrancheGraph(skills){
  // group skills by branche name
  const byBranche = {};
  skills.forEach(s => {
    const key = s.branche || s.id;
    byBranche[key] = byBranche[key] || [];
    byBranche[key].push(s);
  });
  Object.values(byBranche).forEach(list => list.sort((a,b) => a.niveau - b.niveau));

  // determine, for each branche, its "fork parent": the branche and
  // skill from which it forks (based on the niveau-0 skill's parent_id)
  const brancheParent = {}; // brancheKey -> { brancheKey: parentBrancheKey, parentSkillId }
  const idToBranche = {};
  skills.forEach(s => { idToBranche[s.id] = s.branche || s.id; });

  Object.keys(byBranche).forEach(key => {
    const first = byBranche[key][0];
    if(first && first.parent_id && idToBranche[first.parent_id] && idToBranche[first.parent_id] !== key){
      brancheParent[key] = { parentBranche: idToBranche[first.parent_id], parentSkillId: first.parent_id };
    } else {
      brancheParent[key] = null; // root branche
    }
  });

  // children map: parentBrancheKey -> [childBrancheKey, ...] in first-seen order
  const childrenOf = {};
  const rootBranches = [];
  Object.keys(byBranche).forEach(key => {
    const p = brancheParent[key];
    if(p){
      childrenOf[p.parentBranche] = childrenOf[p.parentBranche] || [];
      childrenOf[p.parentBranche].push(key);
    } else {
      rootBranches.push(key);
    }
  });

  return { byBranche, brancheParent, childrenOf, rootBranches };
}

function buildLayout(skills){
  const { byBranche, brancheParent, childrenOf, rootBranches } = buildBrancheGraph(skills);

  const positions = {};       // id -> {x,y}
  const brancheCol = {};      // brancheKey -> column index (X slot, left to right)
  let nextCol = 0;

  // DFS assigning column indices: root branches left-to-right, fork branches
  // placed to the right of their parent (depth-first), so the tree fans out
  // horizontally while tiers/niveaux progress vertically (top to bottom).
  function assignCols(brancheKey){
    brancheCol[brancheKey] = nextCol++;
    const kids = childrenOf[brancheKey] || [];
    kids.forEach(childKey => assignCols(childKey));
  }
  rootBranches.forEach(rootKey => assignCols(rootKey));

  // y-offset (in tiers) at which a fork branch starts.
  // A branch forking from niveau N of its parent starts at tier N+1.
  const brancheStartTier = {};

  function computeStartTier(brancheKey){
    if(brancheStartTier[brancheKey] !== undefined) return brancheStartTier[brancheKey];
    const parentInfo = brancheParent[brancheKey];
    if(!parentInfo){
      brancheStartTier[brancheKey] = 0;
      return 0;
    }
    const parentBrancheSkills = byBranche[parentInfo.parentBranche] || [];
    const parentSkill = parentBrancheSkills.find(s => s.id === parentInfo.parentSkillId);
    const tier = (parentSkill ? parentSkill.niveau : 0) + 1;
    brancheStartTier[brancheKey] = tier;
    return tier;
  }
  Object.keys(byBranche).forEach(key => computeStartTier(key));

  // place nodes: X = column (branch index), Y = tier (niveau + branch start tier)
  Object.keys(byBranche).forEach(brancheKey => {
    const col = brancheCol[brancheKey];
    const startTier = brancheStartTier[brancheKey];
    const list = byBranche[brancheKey];
    list.forEach(s => {
      const tier = startTier + s.niveau;
      const x = LEFT_PADDING + col * BRANCH_GAP;
      const y = TOP_PADDING + tier * TIER_GAP;
      positions[s.id] = { x, y, brancheKey, col, tier };
    });
  });

  return positions;
}

function renderTree(){
  const skills = currentSkills();
  if(!skills.length){
    document.getElementById('tree-canvas').innerHTML = '<svg id="links"></svg>';
    updatePointsDisplay(skills);
    return;
  }
  const positions = buildLayout(skills);
  const { byBranche, brancheParent, rootBranches } = buildBrancheGraph(skills);
  const canvas = document.getElementById('tree-canvas');

  canvas.innerHTML = '<svg id="links"></svg>';
  const svg = document.getElementById('links');

  let maxX = 0, maxY = 0;
  Object.values(positions).forEach(p => {
    maxX = Math.max(maxX, p.x);
    maxY = Math.max(maxY, p.y);
  });

  // Root "school" node sits above all root branches, horizontally centred.
  const rootCols = rootBranches.map(k => positions[byBranche[k][0].id].x).filter(x => x !== undefined);
  const rootX = rootCols.length ? (Math.min(...rootCols) + Math.max(...rootCols)) / 2 : LEFT_PADDING;
  const rootY = TOP_PADDING - ROOT_GAP_EXTRA;

  const canvasW = maxX + 180;
  const canvasH = maxY + 180;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  svg.setAttribute('width', canvasW);
  svg.setAttribute('height', canvasH);

  const theme = schoolTheme(currentSchool);

  function drawLink(from, to, dashed){
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    let d;
    if(dashed){
      // Fork link: parent node → horizontal → down to child first node.
      // Draw a smooth bezier from the parent (same Y, different X) down to child.
      const midX = (from.x + to.x) / 2;
      const midY = (from.y + to.y) / 2;
      d = `M ${from.x} ${from.y} C ${from.x} ${midY}, ${to.x} ${midY}, ${to.x} ${to.y}`;
    } else {
      // Intra-branch: straight vertical line between consecutive tiers.
      d = `M ${from.x} ${from.y} L ${to.x} ${to.y}`;
    }
    path.setAttribute('d', d);
    path.setAttribute('class', 'link-line' + (dashed ? ' fork' : ''));
    if(dashed) path.setAttribute('stroke-dasharray', '6 6');
    svg.appendChild(path);
  }

  // Links within each branche: consecutive tier nodes connected vertically
  Object.keys(byBranche).forEach(brancheKey => {
    const list = byBranche[brancheKey];
    for(let i=0; i<list.length-1; i++){
      const from = positions[list[i].id];
      const to = positions[list[i+1].id];
      if(from && to) drawLink(from, to, false);
    }
  });

  // Fork links (dashed bezier) from parent skill to child branch's first node
  Object.keys(brancheParent).forEach(brancheKey => {
    const info = brancheParent[brancheKey];
    if(!info) return;
    const from = positions[info.parentSkillId];
    const firstChildSkill = byBranche[brancheKey][0];
    const to = firstChildSkill && positions[firstChildSkill.id];
    if(from && to) drawLink(from, to, true);
  });

  // Root school node + connectors down to each root branch's first (tier-0) node
  const rootDiv = document.createElement('div');
  rootDiv.className = 'node root school-root';
  rootDiv.style.left = rootX + 'px';
  rootDiv.style.top = rootY + 'px';
  rootDiv.style.transform = 'translate(-50%, -50%)';
  rootDiv.style.borderColor = theme.color;
  rootDiv.style.boxShadow = `0 0 26px ${theme.glow}`;
  rootDiv.innerHTML = `<span class="icon" style="filter:none;">✦</span>`;
  canvas.appendChild(rootDiv);

  rootBranches.forEach(brancheKey => {
    const firstSkill = byBranche[brancheKey][0];
    const to = positions[firstSkill.id];
    if(to) drawLink({x: rootX, y: rootY}, to, false);
  });

  // draw nodes
  skills.forEach(s => {
    const pos = positions[s.id];
    if(!pos) return;
    const div = document.createElement('div');
    div.className = 'node ' + (s.etat || 'locked');
    div.style.left = pos.x + 'px';
    div.style.top = pos.y + 'px';
    div.style.transform = 'translate(-50%, -50%)';
    div.style.setProperty('--branche-color', theme.color);
    div.innerHTML = `
      <span class="icon">${renderIcon(s.icone)}</span>
      <span class="node-label">${(s.nom||s.id)}</span>
    `;
    div.addEventListener('click', () => openPanel(s));
    canvas.appendChild(div);
  });

  updatePointsDisplay(skills);
}

/* =========================================================
   RENDU DES ICÔNES
   =========================================================
   La colonne "icone" du Sheet peut contenir :
   - Un emoji direct : 🔥 ⚡ ✨ etc.
   - Une URL complète : https://i.imgur.com/abc.png
   - Un chemin relatif vers une image dans le repo :
     icones/feu.png  (fichier uploadé dans GitHub à côté du HTML)
   La fonction détecte automatiquement lequel utiliser.
   ========================================================= */
function isImageRef(icone){
  if(!icone) return false;
  // URL absolue
  if(icone.startsWith('http://') || icone.startsWith('https://')) return true;
  // Chemin relatif avec extension image connue
  if(/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(icone)) return true;
  return false;
}

function renderIcon(icone){
  if(!icone) return '★';
  if(isImageRef(icone)){
    // Échapper les guillemets pour éviter les injections dans l'attribut src
    const safe = icone.replace(/"/g, '&quot;');
    return `<img class="node-icon-img" src="${safe}" alt="" draggable="false">`;
  }
  // Emoji ou texte simple
  return icone;
}

function updatePointsDisplay(skills){
  const unlocked = skills.filter(s => s.etat === 'unlocked').length;
  const total = skills.length;
  document.getElementById('points-display').textContent = `${unlocked} / ${total} compétences débloquées`;
}

function statusLabel(etat){
  if(etat === 'unlocked') return 'Débloquée';
  if(etat === 'available') return 'Disponible';
  return 'Verrouillée';
}

function formatEffects(effetsRaw){
  if(!effetsRaw || !effetsRaw.trim()) return [];
  return effetsRaw.split(/\n|;/).map(e => e.trim()).filter(Boolean);
}

/* =========================================================
   MINI-LANGAGE DE BALISAGE pour les colonnes "description"
   et "texte_special" du Sheet.

   Dans une cellule, tu peux écrire :
     **texte**             -> texte en gras
     [texte](couleur)       -> texte coloré/italique selon une palette

   Couleurs disponibles : element, feu, glace, soin, poison,
   special, danger (modifiable dans le CSS, classes .color-*)

   Exemple de cellule "description" :
   Vous ciblez une créature que vous pouvez voir, vous lancez une
   **attaque de sort à distance** [élémentaire](element) sur une
   **cible unique**.
   ========================================================= */
function parseRichText(raw){
  if(!raw) return '';
  let safe = raw.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // [texte](couleur)
  safe = safe.replace(/\[([^\]]+)\]\(([a-zA-Z0-9_-]+)\)/g, (m, txt, color) => {
    return `<mark class="color-${color}">${txt}</mark>`;
  });
  // **gras**
  safe = safe.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return safe;
}

function buildElementalEffectsSection(skill){
  const group = getActiveGroup();
  if(!group) return '';
  const brancheKey = skill.branche || skill.id;
  const { key: groupKey, theme, tiers } = group;

  // Every tier the player has explicitly chosen in the Mastery view shows
  // up on a spell's card — including Tier 0 (forme de dégât) — as long as
  // that choice is relevant to the spell's branche. Nothing is excluded
  // based on the spell's niveau anymore.
  const lines = [];
  tiers.forEach((effects, tierIndex) => {
    const choiceKey = `${groupKey}_t${tierIndex}`;
    const chosenId = masteryChoices[choiceKey];
    if(!chosenId) return; // nothing selected at this tier -> show nothing
    const chosenEffect = effects.find(ef => ef.id === chosenId);
    if(!chosenEffect) return;
    if(!effectAppliesToBranch(chosenEffect, brancheKey)) return; // selected effect isn't relevant to this branch
    lines.push({ tierIndex, effect: chosenEffect });
  });

  if(!lines.length) return '';

  let html = `<div class="elemental-effects-block" style="--ec-color:${theme.color}">
    <div class="elemental-effects-title" style="color:${theme.color}">Effet ${theme.label}</div>`;
  lines.forEach(({ tierIndex, effect }) => {
    html += `<div class="elemental-effect-line">
      <span class="ee-tier">T${tierIndex}</span>
      <span class="ee-name">${effect.nom}</span> : ${parseRichText(effect.description)}
    </div>`;
  });
  html += `</div>`;
  return html;
}

function openPanel(skill){
  document.getElementById('panel-tier').textContent = `${(skill.branche||'').replace(/_/g,' ')} · Coût ${skill.cout} pt${skill.cout===1?'':'s'}`;
  document.getElementById('panel-rank').textContent = `RANK – ${skill.niveau}`;
  document.getElementById('panel-title').textContent = skill.nom || skill.id;

  const forkLabel = skill.parent_id ? skill.parent_id : null;

  // Stat lines with arrow prefix, only shown if the corresponding column is filled
  const statDefs = [
    { key: 'degats', label: 'Dégâts génériques' },
    { key: 'portee', label: 'Portée' },
    { key: 'duree', label: 'Durée' },
    { key: 'action', label: 'Ressource d\'Action' },
  ];
  const statLines = statDefs
    .filter(d => skill[d.key] && skill[d.key].trim().length > 0)
    .map(d => `<div class="rank-stat-line"><span class="arrow">→</span><span class="stat-label">${d.label} :</span> ${parseRichText(skill[d.key])}</div>`)
    .join('');

  const elementalSection = buildElementalEffectsSection(skill);

  const body = document.getElementById('panel-body');
  body.innerHTML = `
    <p class="rank-description">${parseRichText(skill.description) || 'Aucune description fournie.'}</p>
    ${statLines ? `<div class="rank-stats">${statLines}</div>` : ''}
    ${skill.texte_special ? `<div class="rank-special">${parseRichText(skill.texte_special)}</div>` : ''}
    ${elementalSection}
    ${forkLabel ? `<div class="stat-row"><span class="label">S'embranche depuis</span><span>${forkLabel}</span></div>` : ''}
    <span class="status-chip ${skill.etat || 'locked'}">${statusLabel(skill.etat)}</span>
  `;

  const footer = document.getElementById('panel-footer');
  footer.innerHTML = '';

  if(skill.lien_slide && skill.lien_slide.trim().length > 0){
    const a = document.createElement('a');
    a.href = skill.lien_slide;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'slide-link';
    a.innerHTML = '↗ Voir le détail (Google Slide)';
    footer.appendChild(a);
  }

  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

document.getElementById('panel-close').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', closePanel);

/* Zoom controls */
function applyZoom(){
  document.getElementById('tree-canvas').style.transform = `scale(${zoomLevel})`;
}
document.getElementById('zoom-in').addEventListener('click', () => {
  zoomLevel = Math.min(2, zoomLevel + 0.15);
  applyZoom();
});
document.getElementById('zoom-out').addEventListener('click', () => {
  zoomLevel = Math.max(0.5, zoomLevel - 0.15);
  applyZoom();
});
document.getElementById('zoom-reset').addEventListener('click', () => {
  zoomLevel = 1;
  applyZoom();
});

/* Drag to pan */
(function enablePan(){
  const wrap = document.getElementById('canvas-wrap');
  let isDown = false, startX, startY, scrollLeft, scrollTop;
  wrap.addEventListener('mousedown', e => {
    isDown = true;
    wrap.classList.add('dragging');
    startX = e.pageX; startY = e.pageY;
    scrollLeft = wrap.scrollLeft; scrollTop = wrap.scrollTop;
  });
  window.addEventListener('mouseup', () => { isDown = false; wrap.classList.remove('dragging'); });
  window.addEventListener('mousemove', e => {
    if(!isDown) return;
    e.preventDefault();
    wrap.scrollLeft = scrollLeft - (e.pageX - startX);
    wrap.scrollTop = scrollTop - (e.pageY - startY);
  });
})();

async function init(){
  await loadData();
  buildSchoolTabs();
  applySchoolTheme();
  renderTree();
  renderElementDropdown();
  updateElementSelectLabel();
}
init();

/* Re-fetch periodically to reflect live edits to the Sheet (every 60s) */
setInterval(async () => {
  const playerName = getPlayerFromURL();
  const hasSource = PLAYER_SHEETS[playerName] || DATA_SHEETS.competences || DATA_SHEETS.elements;
  if(hasSource){
    await loadData();
    buildSchoolTabs();
    applySchoolTheme();
    renderTree();
    if(masteryViewOpen) renderMasteryView();
  }
}, 60000);
</script>
